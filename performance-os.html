<script>
// ═══════════════════════════════════════════
// DATA LAYER — IndexedDB
// ═══════════════════════════════════════════
let db = null;
async function initDB() {
  return new Promise((resolve,reject) => {
    const req = indexedDB.open('PerformanceOS',2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      ['entries','food','photos','settings','whoop_data','garmin_data'].forEach(n => {
        if(!d.objectStoreNames.contains(n)) d.createObjectStore(n,{keyPath:'id',autoIncrement:true});
      });
    };
    req.onsuccess = e => { db=e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(store) {
  return new Promise(r => {
    const req = db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = () => r(req.result||[]);
    req.onerror = () => r([]);
  });
}
async function dbPut(store,item) {
  return new Promise(r => {
    try {
      const req = db.transaction(store,'readwrite').objectStore(store).put(item);
      req.onsuccess = () => r(req.result);
      req.onerror = (e) => { console.error(`[dbPut] ${store} failed:`, e.target.error, item); r(null); };
    } catch(e) { console.error(`[dbPut] ${store} exception:`, e, item); r(null); }
  });
}
async function dbDelete(store,id) {
  return new Promise(r => {
    const tx = db.transaction(store,'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => r();
  });
}

const STATE = {entries:[],food:[],photos:[],whoop:{connected:false,data:[]},garmin:{connected:false,data:[]}};

async function loadAllData() {
  STATE.entries = await dbGet('entries');
  STATE.food = await dbGet('food');
  STATE.photos = await dbGet('photos');
  const wd = await dbGet('whoop_data');
  if(wd.length) { STATE.whoop.data = wd; STATE.whoop.connected = true; }
  const gd = await dbGet('garmin_data');
  if(gd.length) { STATE.garmin.data = gd; STATE.garmin.connected = true; }

  // Check if Whoop tokens were saved by the callback page (stored in localStorage)
  const whoopToken = localStorage.getItem('whoop_access_token');
  if(whoopToken) {
    STATE.whoop.connected = true;
  }
}

// Poll Railway backend for food entries pushed by Claude
async function syncFoodFromBackend() {
  const backendUrl = localStorage.getItem('pos_backend_url');
  if(!backendUrl) return;
  try {
    const res = await fetch(`${backendUrl}/food/pending`);
    if(!res.ok) return;
    const data = await res.json();
    if(!data.entries || data.entries.length === 0) return;

    const idsToAck = [];
    for(const entry of data.entries) {
      // Check if already synced (same date + meal + items)
      const exists = STATE.food.find(f =>
        f.date === entry.date && f.meal === entry.meal &&
        f.items === entry.items
      );
      if(!exists) {
        const { id: serverId, pushedAt, ...foodEntry } = entry;
        const localId = await dbPut('food', foodEntry);
        foodEntry.id = localId;
        STATE.food.push(foodEntry);
        console.log(`[Food sync] Added: ${entry.meal} ${entry.date} — ${entry.protein}g / ${entry.calories}kcal`);
      }
      idsToAck.push(entry.id);
    }

    // Acknowledge receipt so backend clears the queue
    if(idsToAck.length > 0) {
      await fetch(`${backendUrl}/food/ack`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids: idsToAck })
      });
      console.log(`[Food sync] Acked ${idsToAck.length} entries`);
    }
  } catch(err) {
    console.warn('[Food sync] Failed:', err.message);
  }
}

async function seedIfEmpty() {
  const ex = await dbGet('entries');
  if(ex.length > 0) return;
  for(const e of SEED_ENTRIES) await dbPut('entries',{...e});
  for(const f of SEED_FOOD) await dbPut('food',{...f});
  for(const p of SEED_PHOTOS) await dbPut('photos',{...p});
  await loadAllData();
}

// ═══════════════════════════════════════════
// AUTH LAYER
// ═══════════════════════════════════════════
const PIN_KEY = 'pos_pin_hash';
const SESSION_KEY = 'pos_session';
let pinBuffer = '';

function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function checkSession(){try{const s=sessionStorage.getItem(SESSION_KEY);if(s&&Date.now()-JSON.parse(s).t<8*3600000)return true;}catch(e){}return false;}
function setSession(){sessionStorage.setItem(SESSION_KEY,JSON.stringify({t:Date.now()}));}

async function attemptBiometric(){
  const btn=document.getElementById('bio-btn'),icon=document.getElementById('bio-icon'),status=document.getElementById('bio-status');
  btn.classList.add('scanning');icon.textContent='👆';status.textContent='Touch fingerprint...';status.style.color='#00ff88';
  try{
    if(!window.PublicKeyCredential) throw new Error('not supported');
    const hasKey = localStorage.getItem('pos_cred_id');
    if(!hasKey){
      const cred = await navigator.credentials.create({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rp:{name:'Performance OS',id:location.hostname||'localhost'},
        user:{id:new Uint8Array(16),name:'saurabh',displayName:'Saurabh K.'},
        pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
        timeout:60000
      }});
      if(cred){localStorage.setItem('pos_cred_id',btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));btn.classList.remove('scanning');icon.textContent='✅';setTimeout(()=>unlockApp(),800);return;}
    } else {
      const credId=localStorage.getItem('pos_cred_id');
      const assertion = await navigator.credentials.get({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rpId:location.hostname||'localhost',
        allowCredentials:[{type:'public-key',id:Uint8Array.from(atob(credId),c=>c.charCodeAt(0))}],
        userVerification:'required',timeout:60000
      }});
      if(assertion){btn.classList.remove('scanning');icon.textContent='✅';setTimeout(()=>unlockApp(),600);return;}
    }
  } catch(e){
    btn.classList.remove('scanning');icon.textContent='🔐';
    status.textContent=e.name==='NotAllowedError'?'Cancelled — use PIN below':'Use PIN below';
    status.style.color='#555';
  }
}

function buildPinPad(){
  const pad=document.getElementById('pin-pad');
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const b=document.createElement('button');
    b.textContent=k;
    b.style.cssText=`background:rgba(255,255,255,0.05);border:1px solid #1a1a1a;border-radius:10px;padding:14px;font-size:18px;color:#e0e0e0;cursor:${k?'pointer':'default'};font-family:inherit`;
    if(k) b.onclick=()=>handlePin(k);
    pad.appendChild(b);
  });
}

function handlePin(key){
  if(key==='⌫') pinBuffer=pinBuffer.slice(0,-1);
  else if(pinBuffer.length<4) pinBuffer+=key;
  document.querySelectorAll('.pin-dot').forEach((d,i)=>{
    d.style.background=i<pinBuffer.length?'#00ff88':'transparent';
    d.style.borderColor=i<pinBuffer.length?'#00ff88':'#333';
  });
  if(pinBuffer.length===4){
    setTimeout(()=>{
      const hash=hashPin(pinBuffer),stored=localStorage.getItem(PIN_KEY);
      if(!stored){localStorage.setItem(PIN_KEY,hash);document.getElementById('bio-status').textContent='PIN set!';setTimeout(()=>unlockApp(),600);}
      else if(hash===stored){document.getElementById('bio-status').textContent='✓';setTimeout(()=>unlockApp(),400);}
      else{document.getElementById('bio-status').textContent='Wrong PIN';document.getElementById('bio-status').style.color='#ff4444';}
      pinBuffer='';
      document.querySelectorAll('.pin-dot').forEach(d=>{d.style.background='transparent';d.style.borderColor='#333';});
    },200);
  }
}

function unlockApp(){setSession();document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';renderTab('overview');}
function lockApp(){sessionStorage.removeItem(SESSION_KEY);document.getElementById('app').style.display='none';document.getElementById('auth-screen').style.display='flex';pinBuffer='';}

function drawSparkline(canvasId,data,color,type='line'){
  const canvas=document.getElementById(canvasId);
  if(!canvas||data.length<2)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const vals=data.map(Number).filter(v=>!isNaN(v));
  if(vals.length<2)return;
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const x=i=>(i/(vals.length-1))*W;
  const y=v=>H-((v-min)/range)*(H-4)-2;
  if(type==='bar'){
    const bw=W/vals.length*0.7;
    vals.forEach((v,i)=>{const bh=((v-min)/range)*(H-4)+4;ctx.fillStyle=color+'cc';ctx.beginPath();ctx.roundRect(x(i)-bw/2,H-bh,bw,bh,2);ctx.fill();});
    return;
  }
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+'55');grad.addColorStop(1,color+'00');
  ctx.beginPath();ctx.moveTo(x(0),H);ctx.lineTo(x(0),y(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
  ctx.lineTo(x(vals.length-1),H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(x(vals.length-1),y(vals[vals.length-1]),3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}

const DEEP_CFG={
  weight:{label:'Weight',key:'weight',unit:'kg',color:'#00ff88',target:65.5,lowerBetter:true,src:'entries'},
  hrv:{label:'HRV',key:'hrv',unit:'ms',color:'#00d4ff',src:'entries'},

  recovery:{label:'Recovery',key:'recovery',unit:'%',color:'#b388ff',src:'entries'},
  protein:{label:'Protein',key:'protein',unit:'g',color:'#00ff88',target:155,src:'entries'},
  calories:{label:'Calories',key:'totalCalories',unit:'kcal',color:'#ff9500',src:'entries'},
  volume:{label:'Session Volume',key:'volume',unit:'kg',color:'#ff6b6b',src:'entries',chartType:'bar'},
  sessionCalories:{label:'Session Burn',key:'sessionCalories',unit:'kcal',color:'#ffd43b',src:'entries',chartType:'bar'},

  muscle:{label:'Muscle Mass',key:'muscle',unit:'kg',color:'#00ff88',src:'inbody'},
};

function openDeepView(id){
  const cfg=DEEP_CFG[id];if(!cfg)return;
  const src=cfg.src==='inbody'?INBODY_HISTORY:getSorted();
  const valid=src.filter(d=>d[cfg.key]!=null);
  const nums=valid.map(d=>+d[cfg.key]);
  const best=nums.length?(cfg.lowerBetter?Math.min(...nums):Math.max(...nums)):'—';
  const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):'—';
  const latest=valid.length?valid[valid.length-1][cfg.key]:'—';
  const cid='dvc_'+id;
  document.getElementById('deep-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><div style="font-size:9px;letter-spacing:2px;color:${cfg.color};text-transform:uppercase;margin-bottom:3px">${cfg.label} · Full History</div>
        <div class="mono" style="font-size:26px;color:#fff;font-weight:300">${latest}<span style="font-size:13px;color:#555;margin-left:4px">${cfg.unit}</span></div></div>
      <button class="btn-ghost" onclick="document.getElementById('deep-modal').style.display='none'">✕ close</button>
    </div>
    <canvas id="${cid}" width="680" height="200" style="width:100%;height:auto;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:18px"></canvas>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
      ${[['Latest',latest],['Best',best],['Avg',avg],['Points',valid.length]].map(([l,v])=>`
        <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:10px 12px">
          <div class="label">${l}</div>
          <div class="mono" style="font-size:17px;color:${cfg.color}">${v}<span style="font-size:9px;color:#444;margin-left:2px">${typeof v==='number'?cfg.unit:''}</span></div>
        </div>`).join('')}
    </div>
    <div style="max-height:160px;overflow-y:auto">
      ${[...valid].reverse().map(d=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #0d0d0d;font-size:11px"><span class="mono" style="color:#444">${d.date}</span><span class="mono" style="color:${cfg.color}">${d[cfg.key]} ${cfg.unit}</span></div>`).join('')}
    </div>`;
  document.getElementById('deep-modal').style.display='flex';
  requestAnimationFrame(()=>{
    const canvas=document.getElementById(cid);if(!canvas||valid.length<2)return;
    const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,pad=28;
    ctx.clearRect(0,0,W,H);
    const vals=valid.map(d=>+d[cfg.key]),min=Math.min(...vals)-1,max=Math.max(...vals)+1,range=max-min;
    const x=i=>pad+(i/(valid.length-1))*(W-pad*2);
    const y=v=>H-pad-((v-min)/range)*(H-pad*2);
    ctx.strokeStyle='#111';ctx.lineWidth=1;
    for(let i=0;i<=4;i++){const yy=pad+(i/4)*(H-pad*2);ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad,yy);ctx.stroke();}
    if(cfg.chartType==='bar'){
      const bw=(W-pad*2)/valid.length*0.7;
      vals.forEach((v,i)=>{const bh=((v-min)/range)*(H-pad*2);ctx.fillStyle=cfg.color+'cc';ctx.beginPath();ctx.roundRect(x(i)-bw/2,y(v),bw,H-pad-y(v),3);ctx.fill();});
    } else {
      const grad=ctx.createLinearGradient(0,pad,0,H-pad);grad.addColorStop(0,cfg.color+'44');grad.addColorStop(1,cfg.color+'00');
      ctx.beginPath();ctx.moveTo(x(0),H-pad);ctx.lineTo(x(0),y(vals[0]));
      for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
      ctx.lineTo(x(valid.length-1),H-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));
      for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
      ctx.strokeStyle=cfg.color;ctx.lineWidth=2;ctx.stroke();
      vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(x(i),y(v),3,0,Math.PI*2);ctx.fillStyle=cfg.color;ctx.fill();});
    }
    ctx.fillStyle='#333';ctx.font='9px monospace';ctx.textAlign='center';
    valid.forEach((d,i)=>{if(i%(Math.ceil(valid.length/7))===0)ctx.fillText(d.date.slice?d.date.slice(5):d.date,x(i),H-6);});
  });
}

function getSorted(){return [...STATE.entries].sort((a,b)=>a.date<b.date?-1:1);}
function getLatest(){const s=getSorted();return s[s.length-1]||{};}
function getVal(key){const e=[...getSorted()].reverse().find(d=>d[key]!=null);return e?e[key]:null;}

function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTab(name);
}

function renderTab(name){
  const el=document.getElementById('tab-content');
  if(name==='overview') renderOverview(el);
  else if(name==='training') renderTraining(el);
  else if(name==='nutrition') renderNutrition(el);
  else if(name==='body') renderBody(el);
  else if(name==='photos') renderPhotos(el);
  else if(name==='food') renderFood(el);
  else if(name==='whoop') renderWhoop(el);
  else if(name==='garmin') renderGarmin(el);
  else if(name==='log') renderLog(el);
  else if(name==='settings') renderSettings(el);
  requestAnimationFrame(()=>drawSparklines(name));
}

function drawSparklines(tab){
  if(tab!=='overview'&&tab!=='nutrition')return;
  const s=getSorted();
  const draw=(id,key,color,type='line',src=s)=>{
    const vals=src.filter(d=>d[key]!=null).map(d=>d[key]).slice(-14);
    drawSparkline('spark_'+id,vals,color,type);
  };
  if(tab==='overview'){
    draw('weight','weight','#00ff88');draw('hrv','hrv','#00d4ff');
    draw('rhr','rhr','#ff9500');draw('recovery','recovery','#b388ff');
    draw('protein','protein','#00ff88');draw('calories','totalCalories','#ff9500');
    draw('volume','volume','#ff6b6b','bar');draw('sessionCalories','sessionCalories','#ffd43b','bar');
  }
  if(tab==='nutrition'){
    draw('protein','protein','#00ff88');draw('calories','totalCalories','#ff9500');
  }
}

}

function renderNutrition(el){
  const sorted=getSorted().filter(e=>e.protein);
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      ${miniCard('protein','Daily Protein',getVal('protein'),'g','#00ff88','155g')}
      ${miniCard('calories','Daily Calories',getVal('totalCalories'),'kcal','#ff9500','')}
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="label">Protein vs Targets — All Time</div>
      <canvas id="prot_chart" width="600" height="150" style="width:100%;height:auto;margin-top:10px"></canvas>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid #0f0f0f" class="label">Daily Log</div>
      ${[...sorted].reverse().map(e=>`<div style="padding:9px 16px;border-bottom:1px solid #0a0a0a;display:flex;justify-content:space-between">
        <span class="mono" style="color:#333;font-size:10px">${e.date}</span>
        <div style="display:flex;gap:12px">
          <span class="mono" style="font-size:12px;color:${e.protein>=155?'#00ff88':e.protein>=140?'#ff9500':'#ff4444'}">${e.protein}g</span>
          ${e.totalCalories?`<span class="mono" style="font-size:12px;color:#444">${e.totalCalories}kcal</span>`:''}
        </div>
      </div>`).join('')}
    </div>`;
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('prot_chart');if(!canvas||sorted.length<2)return;
    const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,pad=22;
    ctx.clearRect(0,0,W,H);
    const vals=sorted.map(d=>d.protein),min=100,max=210,range=max-min;
    const x=i=>pad+(i/(sorted.length-1))*(W-pad*2),y=v=>H-pad-((v-min)/range)*(H-pad*2);
    [140,165].forEach((ref,i)=>{
      ctx.strokeStyle=i?'#00ff8830':'#ff950030';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(pad,y(ref));ctx.lineTo(W-pad,y(ref));ctx.stroke();ctx.setLineDash([]);
    });
    const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#00ff8844');grad.addColorStop(1,'#00ff8800');
    ctx.beginPath();ctx.moveTo(x(0),H-pad);ctx.lineTo(x(0),y(vals[0]));
    for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
    ctx.lineTo(x(vals.length-1),H-pad);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.moveTo(x(0),y(vals[0]));for(let i=1;i<vals.length;i++)ctx.lineTo(x(i),y(vals[i]));
    ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.stroke();
    vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(x(i),y(v),2.5,0,Math.PI*2);ctx.fillStyle='#00ff88';ctx.fill();});
    drawSparklines('nutrition');
  });
}

    function drawLine(id, pts, color, refLines){
      const canvas=document.getElementById(id); if(!canvas||pts.length<2)return;
      const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,pad=18;
      ctx.clearRect(0,0,W,H);
      const vals=pts.map(p=>p.v).filter(v=>v!=null);
      if(!vals.length)return;
      const min=Math.min(...vals)-2, max=Math.max(...vals)+2, range=max-min||1;
      const x=i=>pad+(i/(pts.length-1))*(W-pad*2);
      const y=v=>H-pad-((v-min)/range)*(H-pad*2);
      // grid
      ctx.strokeStyle='#0f0f0f';ctx.lineWidth=1;
      for(let i=0;i<=3;i++){const yy=pad+(i/3)*(H-pad*2);ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(W-pad,yy);ctx.stroke();}
      // ref lines
      (refLines||[]).forEach(({v,c})=>{
        if(v<min||v>max)return;
        ctx.strokeStyle=c+'50';ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(pad,y(v));ctx.lineTo(W-pad,y(v));ctx.stroke();ctx.setLineDash([]);
      });
      // fill
      const grad=ctx.createLinearGradient(0,pad,0,H);grad.addColorStop(0,color+'44');grad.addColorStop(1,color+'00');

      // line
      ctx.beginPath();let first=true;
      pts.forEach((p,i)=>{ if(p.v==null)return; if(first){ctx.moveTo(x(i),y(p.v));first=false;}else ctx.lineTo(x(i),y(p.v)); });

      // dots
      pts.forEach((p,i)=>{ if(p.v==null)return; ctx.beginPath();ctx.arc(x(i),y(p.v),2.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill(); });
      // x labels
      ctx.fillStyle='#333';ctx.font='8px monospace';ctx.textAlign='center';
      pts.forEach((p,i)=>{ if(i%(Math.ceil(pts.length/6))===0) ctx.fillText(p.date.slice(5),x(i),H-3); });
    }

    const rev = [...data].reverse(); // oldest first for charts
    drawLine('w_rec_chart', rev.map(d=>({date:d.date,v:d.recovery_score})), '#b388ff', [{v:67,c:'#00ff88'},{v:34,c:'#ff9500'}]);

    drawLine('w_rhr_chart', rev.map(d=>({date:d.date,v:d.resting_heart_rate})), '#ff9500');
    drawLine('w_str_chart', rev.map(d=>({date:d.date,v:d.strain!=null?Math.round(d.strain*10)/10:null})), '#ff6b6b');
  });
}

function connectWhoop(){
  const backendUrl = localStorage.getItem('pos_backend_url');
  if(!backendUrl){
    alert('Please enter your Railway backend URL first');
    return;
  }
  // Clear any stale tokens before starting fresh
  localStorage.removeItem('whoop_access_token');
  localStorage.removeItem('whoop_refresh_token');
  localStorage.removeItem('whoop_expires_at');
  // Redirect to backend which redirects to Whoop OAuth
  window.location.href = `${backendUrl}/whoop/auth`;
}

async function syncWhoop(){
  let token = localStorage.getItem('whoop_access_token');
  const refreshToken = localStorage.getItem('whoop_refresh_token');
  const backendUrl = localStorage.getItem('pos_backend_url');
  if(!token||!backendUrl){renderWhoop(document.getElementById('tab-content'));return;}

  const statusEl = document.querySelector('.status-dot');
  if(statusEl) statusEl.className='status-dot status-syncing';

  try{
    // Try to refresh token first if we have a refresh token
    if(refreshToken){
      try{
        const refreshRes = await fetch(`${backendUrl}/whoop/refresh`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({refresh_token:refreshToken})
        });
        if(refreshRes.ok){
          const tokens = await refreshRes.json();
          if(tokens.access_token){
            token = tokens.access_token;
            localStorage.setItem('whoop_access_token', token);
            if(tokens.refresh_token) localStorage.setItem('whoop_refresh_token', tokens.refresh_token);
            console.log('[Whoop] Token refreshed ✓');
          }
        }
      } catch(e){ console.warn('[Whoop] Token refresh failed, trying existing token'); }
    }

    // All Whoop endpoints are v2
    const recoveryRes = await fetch(`${backendUrl}/whoop/api`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({endpoint:"/v2/recovery",token,params:{limit:"25"}})
    });
    const recoveryData = recoveryRes.ok ? await recoveryRes.json() : {};
    console.log("[Whoop] Recovery:", JSON.stringify(recoveryData).slice(0,300));

    const cycleRes = await fetch(`${backendUrl}/whoop/api`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({endpoint:"/v2/cycle",token,params:{limit:"25"}})
    });
    const cycleData = cycleRes.ok ? await cycleRes.json() : {};

    const sleepRes = await fetch(`${backendUrl}/whoop/api`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({endpoint:"/v2/activity/sleep",token,params:{limit:"25"}})
    });
    const sleepData = sleepRes.ok ? await sleepRes.json() : {};
    console.log("[Whoop] Sleep:", JSON.stringify(sleepData).slice(0,200));

    const records = (recoveryData.records||[]).map(r=>({
      id: r.cycle_id,
      date: r.created_at?.slice(0,10),
      recovery_score: r.score?.recovery_score ?? null,
      hrv_rmssd_on_wake: r.score?.hrv_rmssd_milli ?? null,
      resting_heart_rate: r.score?.resting_heart_rate ?? null,
      created_at: r.created_at,
    }));

    (cycleData.records||[]).forEach(c=>{
      const date = c.start?.slice(0,10);
      const existing = records.find(r=>r.date===date);
      const strain = c.score?.strain ?? null;
      if(existing) existing.strain = strain;
      else if(date) records.push({date, strain, id: c.id});
    });

    (sleepData.records||[]).filter(s=>!s.nap).forEach(s=>{
      // Match by cycle_id first (most accurate)
      const byCycleId = records.find(r=>r.id === s.cycle_id);
      // Fall back: sleep starts night before, cycle date = sleep start date + 1 day
      const sleepDate = s.start?.slice(0,10);
      const nextDay = sleepDate ? new Date(new Date(sleepDate).getTime()+86400000).toISOString().slice(0,10) : null;
      const existing = byCycleId || records.find(r=>r.date===nextDay) || records.find(r=>r.date===sleepDate);
      const hours = s.score?.stage_summary?.total_in_bed_time_milli
        ? Math.round(s.score.stage_summary.total_in_bed_time_milli/360000)/10 : null;
      const perf = s.score?.sleep_performance_percentage ?? null;
      if(existing){ existing.sleep_duration_hours=hours; existing.sleep_score=perf; }
    });

    if(records.length === 0){
      console.warn('[Whoop] No records returned from API');
      // Don't wipe existing cache — just reload from IndexedDB
      const existing = await dbGet('whoop_data');
      STATE.whoop.data = existing;
      STATE.whoop.connected = true;
      localStorage.setItem('whoop_last_sync', new Date().toISOString());
      const el = document.getElementById('tab-content');
      const activeTab = document.querySelector('.tab-btn.active')?.textContent.toLowerCase().trim();
      if(activeTab?.includes('whoop')) renderWhoop(el);
      return;
    }

    // Only persist if we got actual data — never wipe good cache with empty
    if(records.length > 0){
      await dbClear('whoop_data');
      for(const r of records){
        await dbPut('whoop_data', {...r});
      }
      const saved = await dbGet('whoop_data');
      console.log(`[Whoop] Verified ${saved.length} records in IndexedDB`);
      STATE.whoop.data = saved.length > 0 ? saved : records;
    } else {
      console.warn('[Whoop] Sync returned 0 records — keeping existing cache');
      // Still update STATE from existing IndexedDB data
      const existing = await dbGet('whoop_data');
      if(existing.length) STATE.whoop.data = existing;
    }
    STATE.whoop.connected = true;
    localStorage.setItem('whoop_last_sync', new Date().toISOString());
    await autoPopulateFromWhoop(STATE.whoop.data);

    // Re-render whatever tab is currently active
    const activeTab = document.querySelector('.tab-btn.active')?.textContent.toLowerCase().trim();
    const el = document.getElementById('tab-content');
    if(activeTab?.includes('whoop')) renderWhoop(el);
    else if(activeTab?.includes('overview')) renderOverview(el);

    console.log(`[Whoop] Synced ${STATE.whoop.data.length} records ✓`);
  } catch(err){
    console.error('Whoop sync error:',err);
    alert('Sync failed: '+err.message);
  }
}

async function autoPopulateFromWhoop(records){
  // For each Whoop record, update matching entry with HRV/RHR/recovery
  for(const r of records){
    if(!r.date) continue;
    const existing = STATE.entries.find(e=>e.date===r.date);
    if(existing){
      if(r.hrv_rmssd_on_wake) existing.hrv = Math.round(r.hrv_rmssd_on_wake);
      if(r.resting_heart_rate) existing.rhr = r.resting_heart_rate;
      if(r.recovery_score) existing.recovery = r.recovery_score;
      await dbPut('entries',existing);
    } else {
      // Create new entry with Whoop data
      const newEntry = {date:r.date,hrv:r.hrv_rmssd_on_wake?Math.round(r.hrv_rmssd_on_wake):null,rhr:r.resting_heart_rate||null,recovery:r.recovery_score||null,sessionType:'Rest',notes:'Auto-imported from Whoop'};
      const id = await dbPut('entries',newEntry);
      newEntry.id=id;
      STATE.entries.push(newEntry);
    }
  }
  await loadAllData();
}

function disconnectWhoop(){
  localStorage.removeItem('whoop_access_token');
  localStorage.removeItem('whoop_refresh_token');
  localStorage.removeItem('whoop_last_sync');
  STATE.whoop.connected=false;STATE.whoop.data=[];
  dbClear('whoop_data');
  renderWhoop(document.getElementById('tab-content'));
}

async function dbClear(store){
  return new Promise(r=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).clear();tx.oncomplete=()=>r();});
}

// Handle Whoop OAuth callback (when redirected back from Whoop)
function handleWhoopCallback(){
  if(!location.pathname.includes('whoop-callback')&&!location.hash.includes('access_token')) return;
  const params = new URLSearchParams(location.hash.slice(1));
  const token = params.get('access_token');
  const refresh = params.get('refresh_token');
  if(token){
    localStorage.setItem('whoop_access_token',token);
    if(refresh) localStorage.setItem('whoop_refresh_token',refresh);
    STATE.whoop.connected=true;
    history.replaceState(null,'','/');
    // Auto-sync immediately
    setTimeout(()=>syncWhoop(),500);
  }
}

          <button onclick="importGarminManual()" class="btn-primary" style="width:100%;margin-top:10px;padding:10px 0">Import</button>
        </div>

      <div class="card">
        <div class="label" style="margin-bottom:12px">Your Garmin Data (from our sessions)</div>
        <div style="font-size:11px;color:#555;margin-bottom:12px">All your Garmin stats from check-ins are already loaded in the Training tab. Here's a summary:</div>
        ${getSorted().filter(e=>e.volume||e.sessionCalories).map(e=>`<div class="import-row">
          <span class="mono" style="color:#444;font-size:10px">${e.date}</span>
          <span style="color:${SESSION_COLORS[e.sessionType]||'#555'};font-size:10px">${e.sessionType}</span>

            ${e.volume?`<span class="mono" style="color:#ff6b6b;font-size:11px">${e.volume.toLocaleString()}kg</span>`:''}
            ${e.sessionCalories?`<span class="mono" style="color:#ffd43b;font-size:11px">${e.sessionCalories}kcal</span>`:''}
            ${e.load?`<span class="mono" style="color:#888;font-size:11px">L:${e.load}</span>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>

    ${connected && data.length > 0 ? `
    <div class="card" style="padding:0;overflow:hidden;margin-top:14px">
      <div style="padding:10px 16px;border-bottom:1px solid #0f0f0f" class="label">Garmin Activity Data</div>
      <div style="max-height:400px;overflow-y:auto">
        ${[...data].reverse().slice(0,20).map(d=>`<div class="import-row" style="padding:10px 16px">
          <span class="mono" style="color:#444;font-size:10px">${d.date||'—'}</span>
          <div style="display:flex;gap:10px">
            ${d.volume?`<span class="mono" style="color:#ff6b6b;font-size:11px">${d.volume.toLocaleString()}kg</span>`:''}

            ${d.avg_hr?`<span class="mono" style="color:#ff9500;font-size:11px">HR:${d.avg_hr}</span>`:''}
          </div>
        </div>`).join('')}
      </div>
    </div>` : ''}
  `;
}

function showGarminSetup(){document.getElementById('garmin-setup').style.display='block';}

async function importGarminManual(){
  const raw = document.getElementById('garmin-manual-input')?.value;
  if(!raw) return;
  try{
    const data = JSON.parse(raw);
    const records = Array.isArray(data)?data:[data];
    for(const r of records) await dbPut('garmin_data',r);
    STATE.garmin.data = await dbGet('garmin_data');
    STATE.garmin.connected = true;
    localStorage.setItem('garmin_last_sync',new Date().toISOString());
    renderGarmin(document.getElementById('tab-content'));
  }catch(e){alert('Invalid JSON: '+e.message);}
}

async function syncGarmin(){alert('Full Garmin sync coming in Phase 2 after API keys are configured.');}

function openAddEntry(){
  document.getElementById('add-form').innerHTML=[
    ['Date','date','date',''],['Weight (kg)','weight','number','66.2'],
    ['HRV (ms)','hrv','number','47'],['RHR (bpm)','rhr','number','53'],
    ['Recovery (%)','recovery','number','72'],['Volume (kg)','volume','number','9694'],
    ['Session Calories','sessionCalories','number','273'],['Load','load','number','18'],
    ['Protein (g)','protein','number','165'],['Total Calories','totalCalories','number','1600'],
  ].map(([l,k,t,p])=>`<div><label class="label">${l}</label><input type="${t}" class="input" id="ef_${k}" placeholder="${p}" ${k==='date'?`value="${new Date().toISOString().split('T')[0]}"`:''} style="font-family:monospace"></div>`
  ).join('')+`
    <div style="grid-column:1/-1"><label class="label">Session Type</label>
      <select class="input" id="ef_sessionType">${['Rings','Handstand','Planche','Bars','Bouldering','Golf','Treadmill','Rest'].map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div style="grid-column:1/-1"><label class="label">Notes</label>
      <textarea class="input" id="ef_notes" rows="2" placeholder="Session highlights..."></textarea></div>`;
  document.getElementById('add-entry-modal').style.display='flex';
}

function closeAddEntry(){document.getElementById('add-entry-modal').style.display='none';}

async function saveEntry(){
  const g=id=>document.getElementById('ef_'+id)?.value;
  const n=id=>{const v=g(id);return v?+v:null;};
  const entry={date:g('date'),weight:n('weight'),hrv:n('hrv'),rhr:n('rhr'),recovery:n('recovery'),
    sessionType:g('sessionType'),volume:n('volume'),sessionCalories:n('sessionCalories'),
    load:n('load'),protein:n('protein'),totalCalories:n('totalCalories'),notes:g('notes')||''};
  const id=await dbPut('entries',entry);entry.id=id;STATE.entries.push(entry);
  closeAddEntry();
  renderTab(document.querySelector('.tab-btn.active')?.textContent.toLowerCase()||'overview');
}

async function saveFood(){
  const g=id=>document.getElementById(id)?.value;
  const food={date:g('food-date'),meal:g('food-meal'),items:g('food-items'),
    protein:g('food-protein')?+g('food-protein'):null,calories:g('food-calories')?+g('food-calories'):null,notes:g('food-notes')||''};
  const id=await dbPut('food',food);food.id=id;STATE.food.push(food);
  document.getElementById('add-food-modal').style.display='none';renderTab('food');
}

function previewPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const area=document.getElementById('photo-upload-area');area.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;area.dataset.url=ev.target.result;};
  reader.readAsDataURL(file);
}

async function savePhoto(){
  const g=id=>document.getElementById(id)?.value;
  const area=document.getElementById('photo-upload-area');
  const photo={date:g('photo-date'),weight:g('photo-weight')?+g('photo-weight'):null,label:g('photo-label'),notes:g('photo-notes')||'',url:area.dataset.url||null};
  const id=await dbPut('photos',photo);photo.id=id;STATE.photos.push(photo);
  document.getElementById('add-photo-modal').style.display='none';renderTab('photos');
}

function resetPin(){localStorage.removeItem(PIN_KEY);alert('PIN reset — set new PIN on next login.');}
function resetBiometric(){localStorage.removeItem('pos_cred_id');alert('Biometric reset.');}
function exportData(){
  const data={entries:STATE.entries,food:STATE.food,exportDate:new Date().toISOString()};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`perf_os_${new Date().toISOString().split('T')[0]}.json`;a.click();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init(){
  await initDB();
  await seedIfEmpty();
  await loadAllData();
  await syncFoodFromBackend();
  buildPinPad();
  handleWhoopCallback();
  ['food-date','photo-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=new Date().toISOString().split('T')[0];});
  if(checkSession()){unlockApp();return;}
  if(window.PublicKeyCredential&&localStorage.getItem('pos_cred_id')) setTimeout(()=>attemptBiometric(),500);
}

init();
