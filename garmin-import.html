<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garmin History Import</title>
<style>
  body{background:#080808;color:#e0e0e0;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box}
  .card{background:#0c0c0c;border:1px solid #1a1a1a;border-radius:16px;padding:28px;max-width:480px;width:100%}
  h2{font-size:16px;color:#00ff88;margin:0 0 4px;letter-spacing:1px}
  .sub{font-size:12px;color:#444;margin-bottom:20px}
  .stat{background:rgba(255,255,255,0.03);border:1px solid #111;border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between}
  .stat-label{font-size:11px;color:#555}
  .stat-val{font-size:13px;font-family:monospace;color:#00ff88}
  button{width:100%;background:#00ff88;color:#000;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit}
  button:disabled{background:#1a1a1a;color:#333;cursor:default}
  #log{margin-top:16px;font-size:11px;color:#444;font-family:monospace;max-height:200px;overflow-y:auto;background:#050505;border-radius:8px;padding:10px}
  #status{margin-top:12px;font-size:13px;text-align:center}
  .progress{background:#111;border-radius:99px;height:6px;margin-top:12px}
  .progress-bar{height:100%;background:#00ff88;border-radius:99px;transition:width 0.3s;width:0%}
</style>
</head>
<body>
<div class="card">
  <h2>PERFORMANCE OS</h2>
  <div class="sub">Garmin History Import · Jan 2025 → May 2026</div>

  <div class="stat"><span class="stat-label">Total sessions</span><span class="stat-val">298</span></div>
  <div class="stat"><span class="stat-label">Strength sessions</span><span class="stat-val" id="cnt-strength">—</span></div>
  <div class="stat"><span class="stat-label">Golf rounds</span><span class="stat-val" id="cnt-golf">—</span></div>
  <div class="stat"><span class="stat-label">Bouldering sessions</span><span class="stat-val" id="cnt-bouldering">—</span></div>
  <div class="stat"><span class="stat-label">Other (running etc)</span><span class="stat-val" id="cnt-other">—</span></div>

  <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
  <div id="status" style="color:#555">Ready to import</div>
  <button id="btn" onclick="runImport()">Import to Performance OS</button>
  <div id="log"></div>
</div>

// Count by type
const counts = {};
ENTRIES.forEach(e => counts[e.sessionType] = (counts[e.sessionType]||0)+1);
const strength = Object.entries(counts).filter(([k])=>['Rings','Handstand','Planche','Bars','Strength'].includes(k)).reduce((a,[,v])=>a+v,0);
document.getElementById('cnt-strength').textContent = strength;
document.getElementById('cnt-golf').textContent = counts['Golf']||0;
document.getElementById('cnt-bouldering').textContent = counts['Bouldering']||0;
const other = ENTRIES.length - strength - (counts['Golf']||0) - (counts['Bouldering']||0);
document.getElementById('cnt-other').textContent = other;

let db;
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('PerformanceOS', 3);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      ['entries','food','photos','settings','garmin_data'].forEach(n => {
        if(!d.objectStoreNames.contains(n)) d.createObjectStore(n,{keyPath:'id',autoIncrement:true});
      });
      if(!d.objectStoreNames.contains('whoop_data')) d.createObjectStore('whoop_data',{keyPath:'id'});
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

async function runImport() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const bar = document.getElementById('progress-bar');
  btn.disabled = true;
  status.style.color = '#555';
  status.textContent = 'Opening database...';

  try {
    await openDB();
    log('✓ Database opened');

    // Read existing entries
    const existing = await new Promise(r => {
      const req = db.transaction('entries','readonly').objectStore('entries').getAll();
      req.onsuccess = () => r(req.result||[]);
    });
    const existingDates = new Set(existing.map(e => e.date));
    log(`Found ${existing.length} existing entries, ${existingDates.size} unique dates`);

    let imported = 0, skipped = 0, updated = 0;

    for(let i = 0; i < ENTRIES.length; i++) {
      const entry = ENTRIES[i];
      bar.style.width = ((i+1)/ENTRIES.length*100) + '%';

      // Check if entry exists for this date
      const existingEntry = existing.find(e => e.date === entry.date);
      
      if(existingEntry) {
        // Update if new data adds value (volume, HR etc)
        if(!existingEntry.volume && entry.volume) {
          const updated_entry = {...existingEntry, ...entry, id: existingEntry.id};
          await new Promise(r => {
            const req = db.transaction('entries','readwrite').objectStore('entries').put(updated_entry);
            req.onsuccess = r; req.onerror = r;
          });
          updated++;
        } else {
          skipped++;
        }
      } else {
        // New entry
        await new Promise(r => {
          const req = db.transaction('entries','readwrite').objectStore('entries').put(entry);
          req.onsuccess = r; req.onerror = r;
        });
        imported++;
      }

      if(i % 20 === 0) {
        status.textContent = `Importing... ${i+1}/${ENTRIES.length}`;
        log(`${entry.date} · ${entry.sessionType} · ${entry.volume ? entry.volume+'kg' : entry.sessionCalories+'kcal'}`);
        await new Promise(r => setTimeout(r, 10)); // yield to UI
      }
    }

    bar.style.width = '100%';
    status.style.color = '#00ff88';
    status.innerHTML = `✓ Done! ${imported} imported · ${updated} updated · ${skipped} skipped`;
    log(`\n✅ Complete: ${imported} new, ${updated} updated, ${skipped} already existed`);
    btn.textContent = '✓ Import Complete';
    btn.style.cssText = 'width:100%;background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.3);border-radius:10px;padding:14px;font-size:14px;font-family:inherit';

  } catch(err) {
    status.style.color = '#ff4444';
    status.textContent = '✗ Error: ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Retry';
    log('Error: ' + err.message);
  }
}
